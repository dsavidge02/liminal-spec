name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Build
        run: bun run build

      - name: Verify marketplace plugins are committed
        run: git diff --exit-code -- plugins/ .claude-plugin/marketplace.json

      - name: Validate
        run: bun run validate

      - name: Test
        run: bun test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-output
          path: dist/
          retention-days: 7
